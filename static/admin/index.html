<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison Éclat · Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            brand: { 50:'#faf5ff', 100:'#f3e8ff', 200:'#e9d5ff',
                     500:'#a855f7', 600:'#9333ea', 700:'#7e22ce' }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }

    /* ── Calendar grid ───────────────────────── */
    .cal-wrap   { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .cal-header { display: grid; grid-template-columns: 56px repeat(5, 1fr);
                  background: #fff; border-bottom: 1px solid #f1f5f9; flex-shrink: 0; }
    .cal-body   { display: grid; grid-template-columns: 56px repeat(5, 1fr);
                  flex: 1; overflow-y: auto; position: relative; }

    .cal-time-gutter { position: relative; background: #fff; }
    .cal-hour { height: 60px; position: relative; }
    .cal-hour-label {
      position: absolute; right: 8px; top: -9px;
      font-size: 11px; font-weight: 500; color: #94a3b8;
      white-space: nowrap;
    }

    .cal-day-col { position: relative; border-left: 1px solid #e5e7eb; }
    .cal-day-col.today { background: #f8f9ff; }
    /* Full-hour line (solid) + half-hour line (dashed, lighter) */
    .cal-day-cell {
      height: 60px;
      border-bottom: 1px solid #e5e7eb;
      background-image: linear-gradient(
        to bottom,
        transparent 50%,
        #f3f4f6 50%,
        #f3f4f6 calc(50% + 1px),
        transparent calc(50% + 1px)
      );
    }
    /* Gutter hour lines (sync with day cells) */
    .cal-hour::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; background: #e5e7eb;
    }
    .cal-hour::before {
      content: ''; position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px; background: #f3f4f6;
    }

    /* ── Appointment cards ───────────────────── */
    .appt {
      position: absolute; left: 3px; right: 3px;
      border-radius: 7px; padding: 5px 8px;
      overflow: hidden; cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      font-size: 11.5px; line-height: 1.35;
      min-height: 26px; color: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
    }
    .appt:hover { transform: translateY(-1px) scale(1.01);
                  box-shadow: 0 5px 18px rgba(0,0,0,.28); z-index: 10; filter: brightness(1.08); }
    .appt-name    { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .appt-service { opacity: .85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
    .appt-meta    { opacity: .7; font-size: 10.5px; margin-top: 1px; }

    /* ── Current time line ───────────────────── */
    .now-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: #ef4444; z-index: 20; pointer-events: none;
    }
    .now-line::before {
      content:''; position: absolute; left: -5px; top: -4px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444;
    }

    /* ── Side panel ──────────────────────────── */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 380px;
      background: #fff; z-index: 50;
      box-shadow: -24px 0 64px rgba(0,0,0,.12);
      transform: translateX(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .drawer.open  { transform: translateX(0); }

    .backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,.35);
      backdrop-filter: blur(3px);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .28s ease;
    }
    .backdrop.show { opacity: 1; pointer-events: all; }

    /* ── Employee chips ──────────────────────── */
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 12.5px;
      font-weight: 500; cursor: pointer; user-select: none;
      transition: all .15s ease; border: 1.5px solid #e2e8f0;
      background: #f8fafc; white-space: nowrap;
    }
    .chip.off { opacity: .35; background: transparent; }

    /* ── Toast ───────────────────────────────── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; z-index: 100;
      transform: translateX(-50%) translateY(90px);
      background: #0f172a; color: #fff;
      padding: 11px 20px; border-radius: 12px;
      font-size: 13.5px; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,.25);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      white-space: nowrap;
    }
    .toast.up { transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar ───────────────────────────── */
    .scroll::-webkit-scrollbar { width: 5px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    /* ── Pulse dot ───────────────────────────── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .live-dot { animation: pulse 2s ease-in-out infinite; }

    /* ── Login ───────────────────────────────── */
    .login-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

    /* ── List view ───────────────────────────── */
    .list-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 16px; cursor: pointer;
      transition: background .1s;
    }
    .list-row:hover { background: #f8fafc; }

    /* ── History toggle ──────────────────────── */
    .hist-pill {
      display: inline-flex; align-items: center;
      background: #f1f5f9; border-radius: 20px; padding: 3px;
    }
    .hist-pill button {
      padding: 4px 14px; border-radius: 17px; font-size: 12px; font-weight: 500;
      color: #64748b; transition: all .15s ease; cursor: pointer; border: none; background: none;
    }
    .hist-pill button.active { background: #fff; color: #0f172a; box-shadow: 0 1px 4px rgba(0,0,0,.10); }

    /* ── Stats view ──────────────────────────── */
    .kpi-card {
      background: #fff; border: 1px solid #f1f5f9;
      border-radius: 16px; padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .kpi-value { font-size: 28px; font-weight: 700; color: #0f172a; line-height: 1.1; }
    .kpi-label { font-size: 12px; font-weight: 500; color: #94a3b8; margin-top: 4px; }
    .bar-track  { background: #f1f5f9; border-radius: 6px; height: 8px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 6px; transition: width .5s ease; }

    /* ── Callbacks view ──────────────────────── */
    .cb-card {
      background: #fff; border: 1px solid #f1f5f9;
      border-radius: 14px; padding: 16px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .cb-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); }
    .cb-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 9px; border-radius: 20px;
      font-size: 11.5px; font-weight: 600;
    }
    .cb-badge.pending    { background:#fff7ed; color:#c2410c; }
    .cb-badge.called_back{ background:#f0fdf4; color:#166534; }
    .cb-badge.resolved   { background:#f1f5f9; color:#475569; }
  </style>
</head>

<body class="h-full bg-slate-50 text-slate-900 antialiased">

<!-- ═══════════════════════════════════════════════════
     LOGIN
═══════════════════════════════════════════════════ -->
<div id="loginScreen"
     class="hidden fixed inset-0 login-bg flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-8 w-full max-w-sm mx-4 shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-brand-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M10 10L4 4m6 6l-2.879-2.879M11.121 5.879A3 3 0 1 0 5.879 11.12M17.122 13.879a3 3 0 1 0-5.243 5.242"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Maison Éclat</h1>
      <p class="text-slate-400 text-sm mt-1">Tableau de bord · accès réservé</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Token d'accès</label>
        <input id="tokenInput" type="password" placeholder="••••••••••••"
               class="w-full px-4 py-2.5 border border-slate-200 rounded-xl
                      focus:outline-none focus:ring-2 focus:ring-brand-500
                      focus:border-transparent text-sm transition"
               onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <button onclick="doLogin()"
              class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold
                     py-2.5 rounded-xl transition text-sm">
        Accéder
      </button>
    </div>
    <p id="loginError" class="hidden text-red-500 text-sm text-center mt-3"></p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP
═══════════════════════════════════════════════════ -->
<div id="app" class="hidden flex-col h-screen">

  <!-- ── Header ─────────────────────────────── -->
  <header class="bg-white border-b border-slate-100 px-4 py-3 flex items-center gap-3 flex-shrink-0 z-30">

    <!-- Logo -->
    <div class="flex items-center gap-2.5 flex-shrink-0">
      <div class="w-9 h-9 bg-brand-600 rounded-xl flex items-center justify-center
                  text-white text-xs font-bold tracking-tight shadow-sm">ME</div>
      <span class="font-semibold text-slate-800 hidden sm:block text-[15px]">Maison Éclat</span>
    </div>

    <!-- Separator -->
    <div class="w-px h-6 bg-slate-100 hidden sm:block"></div>

    <!-- Week nav -->
    <div class="flex items-center gap-0.5">
      <button onclick="changeWeek(-1)"
              class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center
                     justify-center text-slate-500 transition"
              title="Semaine précédente">
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
      </button>
      <button onclick="goToToday()"
              class="px-3 h-8 text-sm font-medium text-slate-700
                     hover:bg-slate-100 rounded-lg transition"
              id="weekLabel">17–21 mar</button>
      <button onclick="changeWeek(1)"
              class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center
                     justify-center text-slate-500 transition"
              title="Semaine suivante">
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
      </button>
    </div>

    <button onclick="goToToday()"
            class="px-3 h-8 bg-brand-50 hover:bg-brand-100 text-brand-700
                   text-sm font-medium rounded-lg transition hidden md:block">
      Aujourd'hui
    </button>

    <!-- Spacer -->
    <div class="flex-1"></div>

    <!-- History toggle -->
    <div class="hist-pill hidden md:inline-flex" id="histToggle">
      <button id="histBtnUpcoming" class="active" onclick="setHistoryMode(false)">À venir</button>
      <button id="histBtnPast"                    onclick="setHistoryMode(true)">Historique</button>
    </div>

    <!-- RDV count -->
    <div class="hidden md:flex items-center gap-1.5 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
      <i data-lucide="calendar" class="w-3.5 h-3.5 text-slate-400"></i>
      <span id="statCount" class="text-sm font-semibold text-slate-700">—</span>
      <span class="text-sm text-slate-400">RDV</span>
    </div>

    <!-- Live indicator + countdown -->
    <div class="flex items-center gap-1.5 text-xs text-slate-400 flex-shrink-0">
      <div class="w-2 h-2 bg-emerald-400 rounded-full live-dot"></div>
      <span class="hidden sm:block">
        <span id="refreshCountdown">60</span>s
      </span>
    </div>

    <!-- View toggle -->
    <div class="flex items-center bg-slate-100 rounded-lg p-0.5 flex-shrink-0">
      <button onclick="setView('calendar')" id="btnCal"
              class="px-2.5 py-1.5 rounded-md text-slate-500 hover:text-slate-700
                     transition flex items-center gap-1.5 text-xs font-medium">
        <i data-lucide="calendar-days" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:block">Calendrier</span>
      </button>
      <button onclick="setView('list')" id="btnList"
              class="px-2.5 py-1.5 rounded-md text-slate-500 hover:text-slate-700
                     transition flex items-center gap-1.5 text-xs font-medium">
        <i data-lucide="list" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:block">Liste</span>
      </button>
      <button onclick="setView('callbacks')" id="btnCallbacks"
              class="px-2.5 py-1.5 rounded-md text-slate-500 hover:text-slate-700
                     transition flex items-center gap-1.5 text-xs font-medium relative">
        <i data-lucide="voicemail" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:block">Rappels</span>
        <span id="cbBadge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-orange-500
                                   text-white text-[9px] font-bold rounded-full
                                   flex items-center justify-center"></span>
      </button>
      <button onclick="setView('stats')" id="btnStats"
              class="px-2.5 py-1.5 rounded-md text-slate-500 hover:text-slate-700
                     transition flex items-center gap-1.5 text-xs font-medium">
        <i data-lucide="bar-chart-2" class="w-3.5 h-3.5"></i>
        <span class="hidden sm:block">Stats</span>
      </button>
    </div>
  </header>

  <!-- ── Employee filter bar ─────────────────── -->
  <div id="empBar"
       class="bg-white border-b border-slate-100 px-4 py-2
              flex items-center gap-2 overflow-x-auto flex-shrink-0">
    <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider
                 flex-shrink-0 mr-1">Coiffeurs</span>
  </div>

  <!-- ── Calendar view ──────────────────────── -->
  <div id="calView" class="flex-1 overflow-hidden cal-wrap">
    <div class="cal-header" id="calHeader">
      <div></div>
    </div>
    <div class="cal-body scroll" id="calBody">
      <div class="cal-time-gutter" id="calGutter"></div>
    </div>
  </div>

  <!-- ── List view ──────────────────────────── -->
  <div id="listView" class="hidden flex-1 overflow-y-auto scroll">
    <div id="listBody" class="max-w-3xl mx-auto px-4 py-4 pb-24"></div>
  </div>

  <!-- ── Stats view ────────────────────────── -->
  <div id="statsView" class="hidden flex-1 overflow-y-auto scroll">
    <div class="max-w-2xl mx-auto px-4 py-6 pb-24">

      <div class="flex items-center gap-3 mb-5">
        <span class="text-sm font-semibold text-slate-700" id="statsPeriodLabel">—</span>
        <div class="flex-1"></div>
        <button onclick="loadStats()" title="Rafraîchir"
                class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100
                       text-slate-400 transition">
          <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
        </button>
      </div>

      <!-- KPI cards -->
      <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="kpi-card">
          <div class="kpi-value" id="statsRdv">—</div>
          <div class="kpi-label">RDV ce mois</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value text-emerald-600" id="statsRevenue">—</div>
          <div class="kpi-label">CA estimé ce mois</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value text-brand-600" id="statsUpcoming">—</div>
          <div class="kpi-label">RDV à venir</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-value text-orange-500" id="statsPending">—</div>
          <div class="kpi-label">Rappels en attente</div>
        </div>
      </div>

      <!-- Top services -->
      <div class="bg-white border border-slate-100 rounded-2xl p-5 mb-4 shadow-sm">
        <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4">Top services (mois)</div>
        <div id="statsTopServices" class="space-y-3"></div>
      </div>

      <!-- Par coiffeur -->
      <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
        <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4">Par coiffeur·se (mois)</div>
        <div id="statsByEmployee" class="space-y-3"></div>
      </div>

    </div>
  </div>

  <!-- ── Callbacks view ─────────────────────── -->
  <div id="callbacksView" class="hidden flex-1 overflow-y-auto scroll">
    <div class="max-w-2xl mx-auto px-4 py-6 pb-24">

      <!-- Filter tabs -->
      <div class="flex items-center gap-2 mb-5">
        <span class="text-sm font-semibold text-slate-700 mr-1">Demandes de rappel</span>
        <div class="flex-1"></div>
        <button onclick="setCbFilter('pending')" id="cbFilterPending"
                class="px-3 py-1.5 text-xs font-medium rounded-lg transition">En attente</button>
        <button onclick="setCbFilter('all')" id="cbFilterAll"
                class="px-3 py-1.5 text-xs font-medium rounded-lg transition">Toutes</button>
        <button onclick="loadCallbacks()" title="Rafraîchir"
                class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100
                       text-slate-400 transition">
          <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
        </button>
      </div>

      <div id="callbacksList"></div>

    </div>
  </div>

</div>

<!-- ── Drawer backdrop ──────────────────────── -->
<div id="backdrop" class="backdrop" onclick="closeDrawer()"></div>

<!-- ── Drawer ────────────────────────────────── -->
<div id="drawer" class="drawer">
  <div class="flex flex-col h-full">

    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
      <h2 class="font-semibold text-slate-900">Rendez-vous</h2>
      <button onclick="closeDrawer()"
              class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center
                     justify-center transition text-slate-400">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>

    <div class="px-6 pt-5 pb-4 border-b border-slate-50">
      <div class="flex items-center gap-4">
        <div id="dAvatar"
             class="w-14 h-14 rounded-2xl flex items-center justify-center
                    text-white text-xl font-bold flex-shrink-0"></div>
        <div>
          <div id="dClient" class="text-lg font-semibold text-slate-900"></div>
          <div id="dPhone" class="text-sm text-slate-400 mt-0.5 flex items-center gap-1.5">
            <i data-lucide="phone" class="w-3.5 h-3.5"></i>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto scroll px-6 py-5 space-y-3">
      <div class="bg-slate-50 rounded-xl p-4 space-y-3.5">

        <div class="flex items-start gap-3">
          <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm flex-shrink-0">
            <i data-lucide="scissors" class="w-4 h-4 text-slate-500"></i>
          </div>
          <div>
            <div class="text-sm font-semibold text-slate-800" id="dService"></div>
            <div class="text-xs text-slate-400 mt-0.5" id="dDuration"></div>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center shadow-sm flex-shrink-0">
            <i data-lucide="clock" class="w-4 h-4 text-slate-500"></i>
          </div>
          <div>
            <div class="text-sm font-semibold text-slate-800" id="dTime"></div>
            <div class="text-xs text-slate-400 mt-0.5" id="dDate"></div>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <div id="dEmpDot"
               class="w-8 h-8 rounded-lg flex items-center justify-center
                      text-[11px] font-bold text-white flex-shrink-0"></div>
          <div>
            <div class="text-sm font-semibold text-slate-800" id="dEmployee"></div>
            <div class="text-xs text-slate-400 mt-0.5">Coiffeur·se assigné·e</div>
          </div>
        </div>

      </div>

      <div class="flex items-center gap-2 px-1">
        <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
        <span class="text-sm text-slate-500 font-medium">Confirmé</span>
      </div>

      <div id="dNotesWrap" class="hidden bg-amber-50 border border-amber-100
                                   rounded-xl p-4 text-sm text-amber-800">
        <div class="font-semibold text-xs uppercase tracking-wide text-amber-500 mb-1">Note</div>
        <div id="dNotes"></div>
      </div>
    </div>

    <div class="px-6 py-5 border-t border-slate-100">
      <button onclick="cancelBooking()"
              class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                     border border-red-200 text-red-600 hover:bg-red-50
                     rounded-xl text-sm font-medium transition">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
        Annuler le rendez-vous
      </button>
    </div>
  </div>
</div>

<!-- ── Toast ──────────────────────────────────── -->
<div id="toast" class="toast"></div>

<!-- ═══════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════ -->
<script>
// ── Constants ──────────────────────────────────────────────────────
const CAL_START = 9, CAL_END = 20;
const PX_PER_MIN = 1.0;
const MONTHS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
const DAYS_SHORT = ['lun.','mar.','mer.','jeu.','ven.','sam.','dim.'];

const PALETTE = [
  { bg:'#7c3aed', light:'#f5f3ff', border:'#a78bfa', text:'#5b21b6' },
  { bg:'#0891b2', light:'#ecfeff', border:'#67e8f9', text:'#0e7490' },
  { bg:'#e11d48', light:'#fff1f2', border:'#fda4af', text:'#be123c' },
  { bg:'#4f46e5', light:'#eef2ff', border:'#a5b4fc', text:'#3730a3' },
  { bg:'#059669', light:'#ecfdf5', border:'#6ee7b7', text:'#047857' },
  { bg:'#d97706', light:'#fffbeb', border:'#fcd34d', text:'#b45309' },
];

// ── State ──────────────────────────────────────────────────────────
let token        = localStorage.getItem('admin_token') || '';
let bookings     = [];
let weekOffset   = 0;
let view         = 'calendar';
let historyMode  = false;   // false = upcoming, true = past
let activeEmps   = new Set();
let empIndex     = {};
let selectedId   = null;
let refreshTimer = null;
let countdown    = 60;
let nowLineTimer = null;

// ── Boot ───────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();
  buildGutter();

  if (window.innerWidth < 700) setView('list', true);
  else setView('calendar', true);

  loadBookings();
  loadCallbacks();

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft')  changeWeek(-1);
    if (e.key === 'ArrowRight') changeWeek(1);
    if (e.key === 'Escape')     closeDrawer();
  });
});

// ── Auth ───────────────────────────────────────────────────────────
function doLogin() {
  const t = document.getElementById('tokenInput').value.trim();
  if (t) { token = t; localStorage.setItem('admin_token', t); }
  loadBookings();
}
function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginScreen').classList.add('flex');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('app').classList.remove('flex');
}
function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('flex');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('app').classList.add('flex');
}

// ── Data ───────────────────────────────────────────────────────────
async function loadBookings() {
  try {
    const p = new URLSearchParams({ days: 365 });
    if (historyMode) p.set('past', 'true');
    if (token) p.append('token', token);
    const r = await fetch(`/api/v1/admin/bookings?${p}`);
    if (r.status === 401) { showLogin(); return; }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    bookings = await r.json();
    showApp();
    render();
    resetCountdown();
  } catch (err) {
    console.error(err);
    showToast('Erreur de chargement', 'error');
  }
}

function setHistoryMode(past) {
  historyMode = past;
  document.getElementById('histBtnUpcoming').classList.toggle('active', !past);
  document.getElementById('histBtnPast').classList.toggle('active', past);
  // In history mode, calendar doesn't make sense — switch to list
  if (past && view === 'calendar') setView('list', true);
  activeEmps.clear();
  loadBookings();
}

// ── Week helpers ───────────────────────────────────────────────────
function weekDates() {
  const base = new Date();
  base.setDate(base.getDate() + weekOffset * 7);
  const dow = base.getDay();
  const diffToTue = dow === 0 ? -5 : (2 - dow);
  const tue = new Date(base);
  tue.setDate(base.getDate() + diffToTue);
  tue.setHours(0, 0, 0, 0);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(tue); d.setDate(tue.getDate() + i); return d;
  });
}
function weekLabel() {
  const [d0, d4] = [weekDates()[0], weekDates()[4]];
  if (d0.getMonth() === d4.getMonth())
    return `${d0.getDate()}–${d4.getDate()} ${MONTHS[d0.getMonth()]}`;
  return `${d0.getDate()} ${MONTHS[d0.getMonth()]} – ${d4.getDate()} ${MONTHS[d4.getMonth()]}`;
}
function weekBookings() {
  const [start, end] = [weekDates()[0], new Date(weekDates()[4])];
  end.setHours(23, 59, 59, 999);
  return bookings.filter(b => { const t = new Date(b.start_time); return t >= start && t <= end; });
}

// ── Employee colours ───────────────────────────────────────────────
function empColor(name) {
  if (!(name in empIndex)) empIndex[name] = Object.keys(empIndex).length % PALETTE.length;
  return PALETTE[empIndex[name]];
}
function initials(name) {
  if (!name) return '?';
  const p = name.trim().split(' ');
  return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name[0].toUpperCase();
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  bookings.forEach(b => empColor(b.employee_name || ''));
  document.getElementById('weekLabel').textContent = weekLabel();
  document.getElementById('statCount').textContent = weekBookings().length;
  buildEmpBar();
  if (view === 'calendar') renderCalendar();
  else renderList();
}

// ── Employee filter bar ────────────────────────────────────────────
function buildEmpBar() {
  const names = [...new Set(bookings.map(b => b.employee_name).filter(Boolean))].sort();
  if (activeEmps.size === 0) names.forEach(n => activeEmps.add(n));

  const bar = document.getElementById('empBar');
  bar.innerHTML = '<span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider flex-shrink-0 mr-1">Coiffeurs</span>';

  const allOn = activeEmps.size === names.length;
  const allChip = document.createElement('button');
  allChip.className = `chip${allOn ? '' : ' off'}`;
  allChip.textContent = 'Tous';
  allChip.onclick = () => { allOn ? activeEmps.clear() : names.forEach(n => activeEmps.add(n)); render(); };
  bar.appendChild(allChip);

  names.forEach(name => {
    const c = empColor(name);
    const on = activeEmps.has(name);
    const chip = document.createElement('button');
    chip.className = `chip${on ? '' : ' off'}`;
    chip.innerHTML = `<span style="width:9px;height:9px;border-radius:50%;background:${c.bg};flex-shrink:0;display:inline-block"></span><span>${name.split(' ')[0]}</span>`;
    chip.onclick = () => { on ? activeEmps.delete(name) : activeEmps.add(name); render(); };
    bar.appendChild(chip);
  });
}

// ── Calendar ───────────────────────────────────────────────────────
function buildGutter() {
  const g = document.getElementById('calGutter');
  g.innerHTML = '';
  for (let h = CAL_START; h <= CAL_END; h++) {
    const row = document.createElement('div');
    row.className = 'cal-hour';
    if (h < CAL_END) {
      const lbl = document.createElement('span');
      lbl.className = 'cal-hour-label';
      lbl.textContent = `${h}h`;
      row.appendChild(lbl);
    }
    g.appendChild(row);
  }
}

function renderCalendar() {
  const dates   = weekDates();
  const today   = new Date(); today.setHours(0,0,0,0);
  const visible = weekBookings().filter(b => activeEmps.has(b.employee_name));

  // Day headers
  const hdr = document.getElementById('calHeader');
  hdr.innerHTML = '<div></div>';
  dates.forEach((d, i) => {
    const isToday = d.getTime() === today.getTime();
    const col = document.createElement('div');
    col.className = 'text-center py-2.5';
    col.innerHTML = `
      <div class="text-[11px] font-semibold uppercase tracking-wide ${isToday ? 'text-brand-600' : 'text-slate-400'}">${DAYS_SHORT[i+1]}</div>
      <div class="w-9 h-9 mx-auto mt-1 flex items-center justify-center rounded-full text-[17px] font-semibold ${isToday ? 'bg-brand-600 text-white' : 'text-slate-700'}">${d.getDate()}</div>`;
    hdr.appendChild(col);
  });

  // Remove old day cols
  const body = document.getElementById('calBody');
  [...body.children].forEach(c => { if (c.id !== 'calGutter') c.remove(); });

  dates.forEach(date => {
    const dateStr = date.toISOString().slice(0, 10);
    const isToday = date.getTime() === today.getTime();
    const dayBkgs = visible.filter(b => b.start_time.slice(0, 10) === dateStr);

    const col = document.createElement('div');
    col.className = `cal-day-col${isToday ? ' today' : ''}`;
    col.style.minHeight = `${(CAL_END - CAL_START + 1) * 60}px`;

    for (let h = CAL_START; h <= CAL_END; h++) {
      const cell = document.createElement('div');
      cell.className = 'cal-day-cell';
      col.appendChild(cell);
    }

    if (isToday) {
      const now  = new Date();
      const mins = (now.getHours() - CAL_START) * 60 + now.getMinutes();
      if (mins >= 0 && mins <= (CAL_END - CAL_START) * 60) {
        const line = document.createElement('div');
        line.className = 'now-line';
        line.style.top = `${mins * PX_PER_MIN}px`;
        col.appendChild(line);
      }
    }

    const cols = assignColumns(dayBkgs);
    dayBkgs.forEach(b => {
      const colIdx = cols.findIndex(c => c.includes(b.id));
      col.appendChild(buildCard(b, colIdx, cols.length));
    });

    body.appendChild(col);
  });

  clearInterval(nowLineTimer);
  nowLineTimer = setInterval(() => { if (view === 'calendar') renderCalendar(); }, 60_000);

  lucide.createIcons();
}

function assignColumns(bkgs) {
  if (!bkgs.length) return [];
  const sorted = [...bkgs].sort((a,b) => a.start_time.localeCompare(b.start_time));
  const cols = [];
  sorted.forEach(b => {
    let placed = false;
    for (let c = 0; c < cols.length; c++) {
      const lastId = cols[c][cols[c].length - 1];
      const last   = bkgs.find(x => x.id === lastId);
      if (!last || new Date(last.end_time) <= new Date(b.start_time)) {
        cols[c].push(b.id); placed = true; break;
      }
    }
    if (!placed) cols.push([b.id]);
  });
  return cols;
}

function buildCard(b, colIdx, numCols) {
  const start  = new Date(b.start_time);
  const end    = new Date(b.end_time);
  const durMin = Math.round((end - start) / 60000);
  const startM = (start.getHours() - CAL_START) * 60 + start.getMinutes();
  const h      = Math.max(22, durMin * PX_PER_MIN);
  const c      = empColor(b.employee_name || '');
  const gap    = 3;
  const w      = numCols > 1 ? `calc(${100/numCols}% - ${gap*2}px)` : `calc(100% - ${gap*2}px)`;
  const left   = numCols > 1 ? `calc(${colIdx*100/numCols}% + ${gap}px)` : `${gap}px`;
  const timeStr   = `${start.getHours()}h${String(start.getMinutes()).padStart(2,'0')}`;
  const firstName = (b.client_name || '—').split(' ')[0];
  const empFirst  = (b.employee_name || '').split(' ')[0];

  const card = document.createElement('div');
  card.className = 'appt';
  card.style.cssText = `top:${startM*PX_PER_MIN}px;height:${h}px;left:${left};width:${w};background:${c.bg};`;
  card.innerHTML = `<div class="appt-name">${firstName}</div>
    ${h > 36 ? `<div class="appt-service">${b.service_label || ''}</div>` : ''}
    ${h > 52 ? `<div class="appt-meta">${timeStr} · ${empFirst}</div>` : ''}`;
  card.onclick = () => openDrawer(b);
  return card;
}

// ── List view ──────────────────────────────────────────────────────
function renderList() {
  const dates   = weekDates();
  const today   = new Date(); today.setHours(0,0,0,0);
  const visible = weekBookings().filter(b => activeEmps.has(b.employee_name));
  const body    = document.getElementById('listBody');
  body.innerHTML = '';

  if (visible.length === 0) {
    body.innerHTML = `<div class="text-center py-20">
      <svg class="w-12 h-12 mx-auto mb-3 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <p class="text-sm font-medium text-slate-400">Aucun rendez-vous cette semaine</p>
    </div>`;
    return;
  }

  dates.forEach(date => {
    const dateStr = date.toISOString().slice(0, 10);
    const dayBkgs = visible.filter(b => b.start_time.slice(0, 10) === dateStr)
                            .sort((a,b) => a.start_time.localeCompare(b.start_time));
    if (!dayBkgs.length) return;

    const isToday = date.getTime() === today.getTime();
    const sep = document.createElement('div');
    sep.className = 'flex items-center gap-3 mt-6 mb-2';
    sep.innerHTML = `
      <span class="text-sm font-semibold text-slate-700 capitalize">
        ${date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}
      </span>
      ${isToday ? '<span class="bg-brand-100 text-brand-700 text-[11px] font-semibold px-2 py-0.5 rounded-full">Aujourd\'hui</span>' : ''}
      <div class="flex-1 h-px bg-slate-100"></div>
      <span class="text-xs text-slate-400">${dayBkgs.length} RDV</span>`;
    body.appendChild(sep);

    const card = document.createElement('div');
    card.className = 'bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-sm';

    dayBkgs.forEach((b, i) => {
      const c       = empColor(b.employee_name || '');
      const start   = new Date(b.start_time);
      const end     = new Date(b.end_time);
      const durMin  = Math.round((end - start) / 60000);
      const timeStr = `${String(start.getHours()).padStart(2,'0')}h${String(start.getMinutes()).padStart(2,'0')}`;

      const isCancelled = b.status === 'cancelled';
      const statusBadge = isCancelled
        ? '<span class="text-[10px] font-semibold px-2 py-0.5 bg-red-50 text-red-400 rounded-full flex-shrink-0">Annulé</span>'
        : '';
      const row = document.createElement('div');
      row.className = `list-row${i > 0 ? ' border-t border-slate-50' : ''}${isCancelled ? ' opacity-60' : ''}`;
      row.innerHTML = `
        <div class="text-sm font-bold text-slate-700 w-12 flex-shrink-0">${timeStr}</div>
        <div class="w-[3px] h-10 rounded-full flex-shrink-0" style="background:${isCancelled ? '#cbd5e1' : c.bg}"></div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-semibold text-slate-900 truncate">${b.client_name || '—'}</div>
          <div class="text-xs text-slate-400 truncate mt-0.5">${b.service_label || ''}</div>
        </div>
        ${statusBadge}
        <div class="flex items-center gap-2 flex-shrink-0">
          <div class="w-7 h-7 rounded-lg flex items-center justify-center text-[11px] font-bold text-white flex-shrink-0"
               style="background:${isCancelled ? '#cbd5e1' : c.bg}">${initials(b.employee_name)}</div>
          <span class="text-xs text-slate-500 hidden sm:block">${(b.employee_name||'').split(' ')[0]}</span>
        </div>
        <div class="text-xs text-slate-300 w-12 text-right flex-shrink-0">${durMin}min</div>
        <svg class="w-4 h-4 text-slate-200 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>`;
      row.onclick = () => openDrawer(b);
      card.appendChild(row);
    });
    body.appendChild(card);
  });
}

// ── Drawer ─────────────────────────────────────────────────────────
function openDrawer(b) {
  selectedId = b.id;
  const c      = empColor(b.employee_name || '');
  const start  = new Date(b.start_time);
  const end    = new Date(b.end_time);
  const durMin = Math.round((end - start) / 60000);

  document.getElementById('dAvatar').style.background = c.bg;
  document.getElementById('dAvatar').textContent = initials(b.client_name);
  document.getElementById('dClient').textContent = b.client_name || '—';
  document.querySelector('#dPhone span').textContent = b.client_phone || 'Téléphone non renseigné';
  document.getElementById('dService').textContent  = b.service_label || '—';
  document.getElementById('dDuration').textContent = `${durMin} minutes`;

  const hS = String(start.getHours()).padStart(2,'0');
  const mS = String(start.getMinutes()).padStart(2,'0');
  const hE = String(end.getHours()).padStart(2,'0');
  const mE = String(end.getMinutes()).padStart(2,'0');
  document.getElementById('dTime').textContent = `${hS}h${mS} → ${hE}h${mE}`;
  document.getElementById('dDate').textContent =
    start.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const empDot = document.getElementById('dEmpDot');
  empDot.style.background = c.bg;
  empDot.textContent = initials(b.employee_name);
  document.getElementById('dEmployee').textContent = b.employee_name || '—';

  const notesWrap = document.getElementById('dNotesWrap');
  document.getElementById('dNotes').textContent = b.notes || '';
  b.notes ? notesWrap.classList.remove('hidden') : notesWrap.classList.add('hidden');

  document.getElementById('drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
  lucide.createIcons();
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
  selectedId = null;
}

async function cancelBooking() {
  if (!selectedId) return;
  if (!confirm('Annuler ce rendez-vous ?')) return;
  try {
    const p = new URLSearchParams();
    if (token) p.append('token', token);
    const r = await fetch(`/api/v1/bookings/${selectedId}?${p}`, { method: 'DELETE' });
    if (r.ok || r.status === 200) {
      bookings = bookings.filter(b => b.id !== selectedId);
      closeDrawer(); render(); showToast('Rendez-vous annulé');
    } else { showToast('Erreur lors de l\'annulation', 'error'); }
  } catch { showToast('Erreur réseau', 'error'); }
}

// ── Navigation ─────────────────────────────────────────────────────
function changeWeek(delta) { weekOffset += delta; render(); }
function goToToday()       { weekOffset = 0;       render(); }

function setView(v, silent = false) {
  view = v;
  const calView       = document.getElementById('calView');
  const listView      = document.getElementById('listView');
  const callbacksView = document.getElementById('callbacksView');
  const statsView     = document.getElementById('statsView');
  const btnCal        = document.getElementById('btnCal');
  const btnList       = document.getElementById('btnList');
  const btnCallbacks  = document.getElementById('btnCallbacks');
  const btnStats      = document.getElementById('btnStats');
  const empBar        = document.getElementById('empBar');
  const histToggle    = document.getElementById('histToggle');
  const on  = 'bg-white shadow-sm text-slate-700';
  const off = 'text-slate-500 hover:text-slate-700';

  calView.classList.add('hidden');
  listView.classList.add('hidden');
  callbacksView.classList.add('hidden');
  statsView.classList.add('hidden');
  btnCal.className       = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${off}`;
  btnList.className      = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${off}`;
  btnCallbacks.className = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium relative ${off}`;
  btnStats.className     = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${off}`;

  if (v === 'calendar') {
    calView.classList.remove('hidden');
    btnCal.className = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${on}`;
    empBar.classList.remove('hidden');
    histToggle.classList.remove('hidden');
    histToggle.classList.add('md:inline-flex');
  } else if (v === 'list') {
    listView.classList.remove('hidden');
    btnList.className = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${on}`;
    empBar.classList.remove('hidden');
    histToggle.classList.remove('hidden');
    histToggle.classList.add('md:inline-flex');
  } else if (v === 'stats') {
    statsView.classList.remove('hidden');
    btnStats.className = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium ${on}`;
    empBar.classList.add('hidden');
    histToggle.classList.add('hidden');
    loadStats();
  } else {
    // callbacks
    callbacksView.classList.remove('hidden');
    btnCallbacks.className = `px-2.5 py-1.5 rounded-md transition flex items-center gap-1.5 text-xs font-medium relative ${on}`;
    empBar.classList.add('hidden');
    histToggle.classList.add('hidden');
    renderCallbacks();
  }
  if (!silent && v !== 'callbacks' && v !== 'stats') render();
}

// ── Refresh countdown ──────────────────────────────────────────────
function resetCountdown() {
  clearInterval(refreshTimer);
  countdown = 60;
  document.getElementById('refreshCountdown').textContent = 60;
  refreshTimer = setInterval(() => {
    countdown--;
    document.getElementById('refreshCountdown').textContent = countdown;
    if (countdown <= 0) loadBookings();
  }, 1000);
}

// ── Toast ──────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'error' ? '#dc2626' : '#0f172a';
  el.classList.add('up');
  setTimeout(() => el.classList.remove('up'), 3200);
}

// ── Callbacks ──────────────────────────────────────────────────────
let callbacks    = [];
let cbFilter     = 'pending';

async function loadCallbacks() {
  try {
    const p = new URLSearchParams();
    if (token) p.append('token', token);
    const r = await fetch(`/api/v1/admin/callbacks?${p}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    callbacks = await r.json();
    updateCbBadge();
    if (view === 'callbacks') renderCallbacks();
  } catch (err) {
    console.error('Callbacks load error:', err);
  }
}

function updateCbBadge() {
  const pending = callbacks.filter(c => c.status === 'pending').length;
  const badge = document.getElementById('cbBadge');
  if (pending > 0) {
    badge.textContent = pending > 9 ? '9+' : pending;
    badge.classList.remove('hidden');
    badge.classList.add('flex');
  } else {
    badge.classList.add('hidden');
    badge.classList.remove('flex');
  }
}

function setCbFilter(f) {
  cbFilter = f;
  renderCallbacks();
}

function renderCallbacks() {
  const list = document.getElementById('callbacksList');
  list.innerHTML = '';

  // Update filter button styles
  const fPending = document.getElementById('cbFilterPending');
  const fAll     = document.getElementById('cbFilterAll');
  const activeClass = 'bg-slate-900 text-white';
  const inactiveClass = 'bg-slate-100 text-slate-500 hover:bg-slate-200';
  fPending.className = `px-3 py-1.5 text-xs font-medium rounded-lg transition ${cbFilter === 'pending' ? activeClass : inactiveClass}`;
  fAll.className     = `px-3 py-1.5 text-xs font-medium rounded-lg transition ${cbFilter === 'all'     ? activeClass : inactiveClass}`;

  const visible = cbFilter === 'pending'
    ? callbacks.filter(c => c.status === 'pending')
    : callbacks;

  if (visible.length === 0) {
    list.innerHTML = `<div class="text-center py-20">
      <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-3">
        <svg class="w-7 h-7 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="text-sm font-medium text-slate-400">
        ${cbFilter === 'pending' ? 'Aucune demande en attente' : 'Aucune demande de rappel'}
      </p>
    </div>`;
    lucide.createIcons();
    return;
  }

  visible.forEach(cb => {
    const card = document.createElement('div');
    card.className = 'cb-card mb-3';

    const createdAt = new Date(cb.created_at);
    const dateStr   = createdAt.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'});
    const timeStr   = createdAt.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    const durStr    = cb.recording_duration ? `${cb.recording_duration}s` : '';

    const badgeLabel = { pending: 'En attente', called_back: 'Rappelé', resolved: 'Résolu' }[cb.status] || cb.status;

    const audioBlock = cb.recording_url
      ? `<audio controls class="w-full mt-3 h-9 rounded-lg" src="${cb.recording_url}"></audio>`
      : '';

    const transcriptBlock = cb.transcription
      ? `<div class="mt-3 bg-slate-50 rounded-xl p-3 text-sm text-slate-600 leading-relaxed border border-slate-100">
           <div class="text-[10px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Transcription</div>
           ${cb.transcription}
         </div>`
      : (cb.recording_url
          ? '<div class="mt-2 text-xs text-slate-400 italic">Transcription en cours…</div>'
          : '');

    const actionBtn = cb.status === 'pending'
      ? `<button onclick="markCallback(${cb.id},'called_back')"
                 class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white
                        text-xs font-semibold rounded-lg transition flex items-center gap-1.5">
           <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
               d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
           </svg>
           Marquer rappelé
         </button>`
      : (cb.status === 'called_back'
          ? `<button onclick="markCallback(${cb.id},'resolved')"
                     class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600
                            text-xs font-semibold rounded-lg transition">
               Résoudre
             </button>`
          : '');

    card.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div class="flex items-center gap-2.5 min-w-0">
          <div class="w-9 h-9 bg-orange-100 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg class="w-4.5 h-4.5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:18px;height:18px">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
          </div>
          <div class="min-w-0">
            <div class="text-sm font-bold text-slate-900">${cb.caller_phone || 'N° inconnu'}</div>
            <div class="text-xs text-slate-400 mt-0.5">${dateStr} à ${timeStr}${durStr ? ` · ${durStr}` : ''}</div>
          </div>
        </div>
        <span class="cb-badge ${cb.status} flex-shrink-0">${badgeLabel}</span>
      </div>
      ${audioBlock}
      ${transcriptBlock}
      ${actionBtn ? `<div class="mt-3 flex gap-2">${actionBtn}</div>` : ''}
    `;
    list.appendChild(card);
  });
  lucide.createIcons();
}

// ── Stats ───────────────────────────────────────────────────────────
let statsData = null;

async function loadStats() {
  try {
    const p = new URLSearchParams();
    if (token) p.append('token', token);
    const r = await fetch(`/api/v1/admin/stats?${p}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    statsData = await r.json();
    renderStats();
  } catch (err) {
    console.error('Stats load error:', err);
    showToast('Erreur chargement stats', 'error');
  }
}

function renderStats() {
  if (!statsData) return;
  const s = statsData;

  document.getElementById('statsPeriodLabel').textContent = s.period_label || '—';
  document.getElementById('statsRdv').textContent     = s.rdv_count ?? '—';
  document.getElementById('statsRevenue').textContent = s.revenue_eur != null ? `${s.revenue_eur.toLocaleString('fr-FR')} €` : '—';
  document.getElementById('statsUpcoming').textContent = s.upcoming_count ?? '—';
  document.getElementById('statsPending').textContent  = s.pending_callbacks ?? '—';

  // Top services
  const svcEl = document.getElementById('statsTopServices');
  svcEl.innerHTML = '';
  const maxSvc = s.top_services?.[0]?.count || 1;
  if (!s.top_services?.length) {
    svcEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Aucun RDV ce mois</p>';
  } else {
    s.top_services.forEach(svc => {
      const pct = Math.round((svc.count / maxSvc) * 100);
      svcEl.innerHTML += `
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-medium text-slate-800 truncate max-w-[65%]">${svc.label}</span>
            <span class="text-xs text-slate-400 flex-shrink-0">${svc.count} RDV · ${svc.revenue.toLocaleString('fr-FR')} €</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill bg-brand-500" style="width:${pct}%"></div>
          </div>
        </div>`;
    });
  }

  // By employee
  const empEl = document.getElementById('statsByEmployee');
  empEl.innerHTML = '';
  const maxEmp = s.by_employee?.[0]?.count || 1;
  if (!s.by_employee?.length) {
    empEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">Aucun RDV ce mois</p>';
  } else {
    s.by_employee.forEach(emp => {
      const c   = empColor(emp.name);
      const pct = Math.round((emp.count / maxEmp) * 100);
      empEl.innerHTML += `
        <div>
          <div class="flex items-center gap-2.5 mb-1.5">
            <div class="w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-bold text-white flex-shrink-0"
                 style="background:${c.bg}">${initials(emp.name)}</div>
            <span class="text-sm font-medium text-slate-800 flex-1 truncate">${emp.name}</span>
            <span class="text-xs text-slate-400 flex-shrink-0">${emp.count} RDV · ${emp.revenue.toLocaleString('fr-FR')} €</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${c.bg}"></div>
          </div>
        </div>`;
    });
  }
  lucide.createIcons();
}

async function markCallback(id, newStatus) {
  try {
    const p = new URLSearchParams();
    if (token) p.append('token', token);
    const r = await fetch(`/api/v1/admin/callbacks/${id}?${p}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const labels = { called_back: 'Rappel effectué', resolved: 'Résolu' };
    showToast(labels[newStatus] || 'Mis à jour');
    await loadCallbacks();
  } catch {
    showToast('Erreur lors de la mise à jour', 'error');
  }
}
</script>
